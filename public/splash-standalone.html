<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadarn Martech — Splash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ═══ SPLASH OVERLAY ═══ */
  .splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    overflow: hidden;
    transition: transform 1.2s cubic-bezier(0.76, 0, 0.24, 1);
  }
  .splash.reveal {
    transform: translateY(-100%);
  }
  .splash-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0e2a4a;
  }

  /* Grid tech */
  .tech-grid {
    position: absolute;
    inset: 0;
    opacity: 0.06;
    background-image:
      linear-gradient(rgba(154,122,81,0.4) 1px, transparent 1px),
      linear-gradient(90deg, rgba(154,122,81,0.4) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Scan line */
  .scan-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(154,122,81,0.6), transparent);
    animation: scanMove 2.4s linear infinite;
  }
  @keyframes scanMove {
    from { top: -2%; }
    to { top: 102%; }
  }

  /* Conteúdo central */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* Logo */
  .logo {
    width: 280px;
    height: 280px;
    object-fit: contain;
    opacity: 0;
    transform: scale(0.7);
    filter: blur(8px);
    animation: logoIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
  }
  @media (min-width: 640px) { .logo { width: 360px; height: 360px; } }
  @media (min-width: 1024px) { .logo { width: 440px; height: 440px; } }
  @keyframes logoIn {
    to { opacity: 1; transform: scale(1); filter: blur(0); }
  }

  /* Nome */
  .name {
    margin-top: -4px;
    font-family: Georgia, 'Canela', 'Times New Roman', serif;
    font-weight: 500;
    font-size: 1.25rem;
    text-transform: uppercase;
    letter-spacing: 0.35em;
    color: #9a7a51;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 1.4s forwards;
  }
  @media (min-width: 640px) { .name { font-size: 1.5rem; } }
  @media (min-width: 1024px) { .name { font-size: 1.875rem; } }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Linha glow */
  .glow-line {
    margin-top: 12px;
    height: 1px;
    width: 160px;
    transform-origin: center;
    transform: scaleX(0);
    opacity: 0;
    background: linear-gradient(90deg, transparent, #9a7a51, transparent);
    box-shadow: 0 0 12px rgba(154,122,81,0.4);
    animation: lineIn 0.4s ease-out 2.1s forwards;
  }
  @media (min-width: 640px) { .glow-line { width: 224px; } }
  @media (min-width: 1024px) { .glow-line { width: 288px; } }
  @keyframes lineIn {
    to { transform: scaleX(1); opacity: 1; }
  }

  /* Subtítulo */
  .subtitle {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    font-family: Inter, system-ui, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-size: 1rem;
  }
  @media (min-width: 640px) { .subtitle { font-size: 1.125rem; } }
  @media (min-width: 1024px) { .subtitle { font-size: 1.25rem; } }
  .subtitle span {
    color: rgba(154,122,81,0.7);
    opacity: 0;
  }
  .subtitle .dot {
    color: rgba(154,122,81,0.3);
    margin-right: 8px;
  }
  .subtitle span:nth-child(1) { animation: fadeIn 0.25s ease 2.6s forwards; }
  .subtitle span:nth-child(2) { animation: fadeIn 0.25s ease 2.75s forwards; }
  .subtitle span:nth-child(3) { animation: fadeIn 0.25s ease 2.9s forwards; }
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Partículas cantos */
  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(154,122,81,0.3);
    opacity: 0;
    transform: scale(0);
  }
  .particle.tl { top: 24px; left: 24px; animation: particleIn 0.4s ease 0.5s forwards; }
  .particle.tr { top: 24px; right: 24px; animation: particleIn 0.4s ease 0.7s forwards; }
  .particle.bl { bottom: 24px; left: 24px; animation: particleIn 0.4s ease 0.9s forwards; }
  .particle.br { bottom: 24px; right: 24px; animation: particleIn 0.4s ease 1.1s forwards; }
  @keyframes particleIn {
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<!-- ═══ SPLASH — copie daqui ═══ -->
<div class="splash" id="splash">
  <div class="splash-bg">
    <div class="tech-grid"></div>
    <div class="scan-line"></div>

    <div class="content">
      <!-- IMPORTANTE: troque o src pela logo -->
      <img class="logo" src="logo-splash.png" alt="Cadarn Martech" />
      <h1 class="name">Cadarn Martech</h1>
      <div class="glow-line"></div>
      <div class="subtitle">
        <span>Marketing</span>
        <span><span class="dot">·</span>Gestão</span>
        <span><span class="dot">·</span>Growth</span>
      </div>
    </div>

    <div class="particle tl"></div>
    <div class="particle tr"></div>
    <div class="particle bl"></div>
    <div class="particle br"></div>
  </div>
</div>
<!-- ═══ FIM DO SPLASH ═══ -->

<!-- Conteúdo de baixo (substitua pelo seu) -->
<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#5e0f0b;color:#f1e4d3;font-family:Inter,sans-serif;">
  <p style="font-size:1.5rem;">Conteúdo da proposta aqui</p>
</div>

<script>
  // Timing: 3.6s de intro + 1.2s de cortina subindo
  setTimeout(function() {
    document.getElementById('splash').classList.add('reveal');
  }, 3600);
  setTimeout(function() {
    document.getElementById('splash').style.display = 'none';
  }, 4800);
</script>

</body>
</html>
